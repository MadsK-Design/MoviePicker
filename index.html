<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movie Picker</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>
<div id="login">

    <h1>🎬 Movie Picker</h1>

    <input
        type="text"
        id="loginUsername"
        placeholder="Username">

    <input
        type="password"
        id="loginPassword"
        placeholder="Password">

    <button id="loginButton">Login</button>

    <p id="loginError"></p>

</div>


<div id="app" class="hidden">

    <div class="top-bar">
        <button id="logoutButton">Logout</button>
    </div>    


    <h1>🎬 Movie Picker</h1>

    <div class="form">

        <input
            type="text"
            id="movieName"
            placeholder="Movie Name">

        <div class="time-inputs">

            <input
                type="number"
                id="movieHours"
                placeholder="Hours"
                min="0">

            <input
                type="number"
                id="movieMinutes"
                placeholder="Minutes"
                min="0"
                max="59">

        </div>

        <div class="dropdown">

            <button id="genreButton" type="button">
                Select Genres ▼
            </button>

            <div id="genreContainer" class="dropdown-content"></div>

        </div>

        <button id="addMovie">
            Add Movie
        </button>

    </div>

    <hr>

 <div class="random-picker">

    <div class="filters">

        <div class="dropdown">
            <button id="filterGenreButton" type="button">
                Select Genres ▼
            </button>

            <div id="filterGenreContainer" class="dropdown-content"></div>
        </div>

        <div class="filter-time-inputs">
            <input
                type="number"
                id="filterHours"
                placeholder="Max Hours"
                min="0">

            <input
                type="number"
                id="filterMinutes"
                placeholder="Max Minutes"
                min="0"
                max="59">
        </div>

        <label class="watched-toggle">
            <input
                type="checkbox"
                id="includeWatchedRandom">

            Include Watched
        </label>

        <button id="randomMovieButton">
            🎲 Pick Random Movie
        </button>

    </div>

    <div id="randomMovieResult"></div>

</div>

<hr>

<p>Sort the Movielist</p>

<div class="list-filters">

    <div class="dropdown">
        <button id="listFilterGenreButton" type="button">
            Filter Genres ▼
        </button>

        <div id="listFilterGenreContainer" class="dropdown-content"></div>
    </div>

    <div class="list-filter-time-inputs">
        <input
            type="number"
            id="listFilterHours"
            placeholder="Max Hours"
            min="0">

        <input
            type="number"
            id="listFilterMinutes"
            placeholder="Max Minutes"
            min="0"
            max="59">
    </div>

    <label class="watched-toggle">
    <input
        type="checkbox"
        id="showWatched">

    Show Watched
    </label>

    </div>

        <h2>Movies</h2>

        <div id="movieList"></div>

        <div id="editModal" class="modal hidden">
        <div class="modal-content">

            <h2>Edit Movie</h2>

            <input
                type="text"
                id="editMovieName"
                placeholder="Movie Name">

            <div class="time-inputs">
                <input
                    type="number"
                    id="editMovieHours"
                    placeholder="Hours"
                    min="0">

                <input
                    type="number"
                    id="editMovieMinutes"
                    placeholder="Minutes"
                    min="0"
                    max="59">
            </div>

            <div id="editGenreContainer" class="edit-genre-container"></div>

            <div class="edit-actions">
                <button id="saveEditButton">Save Changes</button>
                <button id="cancelEditButton">Cancel</button>
            </div>

        </div>
    </div>


</div>

    <!-- Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <!-- JavaScript -->
    <script src="config.js"></script>
    <script src="database.js"></script>
    <script src="script.js"></script>
    <script src="login.js"></script>


</body>

</html>
